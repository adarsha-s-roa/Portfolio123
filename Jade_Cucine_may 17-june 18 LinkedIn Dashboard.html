<style>
*{box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#ffffff,#f5f7fa);padding:24px;margin:0;color:#1a202c}
.wrap{max-width:1400px;margin:auto}
.card{background:#fff;border-radius:18px;padding:28px;box-shadow:0 4px 18px rgba(0,0,0,.08);margin-bottom:24px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.item{border:1px solid #e2e8f0;padding:18px;border-radius:14px;cursor:pointer;transition:.3s;background:#fff}
.item:hover{transform:translateY(-4px);border-color:#0f766e}
.badge{display:inline-block;background:#dbeafe;color:#0369a1;padding:8px 14px;border-radius:20px;font-size:12px;margin-top:8px}
.muted{font-size:13px;color:#666}
.block{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-top:16px;white-space:pre-line;line-height:1.8}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
button{background:#0f766e;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer}
.hidden{display:none}
#toast{position:fixed;right:20px;bottom:20px;background:#0f766e;color:#fff;padding:12px 18px;border-radius:8px;display:none}
</style>

document.getElementById('count').innerText = posts.length;

const grid = document.getElementById('grid');
const detail = document.getElementById('detail');
const calendar = document.getElementById('calendar');

function toast(){
 const t=document.getElementById('toast');
 t.style.display='block';
 setTimeout(()=>t.style.display='none',1200);
}

function copyText(v){
 navigator.clipboard.writeText(v||'');
 toast();
}

function showCalendar(){
 detail.classList.add('hidden');
 calendar.classList.remove('hidden');
}

function showPost(i){
 const p=posts[i];
 calendar.classList.add('hidden');
 detail.classList.remove('hidden');

 detail.innerHTML = `
 <div class="row">
 <div>
 <div class="muted">${p.date} • 10:30 AM</div>
 <h2>${p.topic}</h2>
 <span class="badge">${p.pillar}</span>
 </div>
 <button onclick="showCalendar()">Back</button>
 </div>
